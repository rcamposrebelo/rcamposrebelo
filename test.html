<script>
// Ler CSV embutido
function parseCSV(text) {
    const lines = text.trim().split("\n");
    const result = [];

    for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        result.push({
            title: cols[0].replace(/"/g, ''),
            authors: cols[1].replace(/"/g, ''),
            venue: cols[2].replace(/"/g, ''),
            year: cols[3],
            doi: cols[4]
        });
    }
    return result;
}

// Gerar HTML
function renderPublications(publications) {
    const container = document.getElementById("pub-container");
    container.innerHTML = "";

    publications.forEach(pub => {
        container.innerHTML += `
            <a class="pub-link" href="${pub.doi}" target="_blank">
                <div class="pub">
                    <div class="pub-info">
                        <span class="pub-title">${pub.title}</span>
                        <span class="pub-authors">${pub.authors}</span>
                        <span class="pub-venue"><em>${pub.venue}</em></span>
                    </div>
                    <span class="pub-year">${pub.year}</span>
                </div>
            </a>
        `;
    });
}

// Carregar CSV interno
const csvText = document.getElementById("pubcsv").textContent;
const publications = parseCSV(csvText);
renderPublications(publications);
</script>
